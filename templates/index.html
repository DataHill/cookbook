<h1>Recipes</h1>

{% for category, cat_recipes in recipes | groupby("category") %}

  <h2>{{ category }}</h2>

  {% for cuisine, cuisine_recipes in cat_recipes | groupby("cuisine") %}

    <h3>{{ cuisine }}</h3>

    <ul>
    {% for recipe in cuisine_recipes %}
      <li>
        <a href="/recipes/{{ recipe.slug }}.html">
          {{ recipe.recipe_name }}
        </a>
      </li>
    {% endfor %}
    </ul>

  {% endfor %}

{% endfor %}
