<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h1, h2, h3 {
            margin-top: 30px;
        }

        .category {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }

        .cuisine {
            margin-left: 20px;
            margin-top: 15px;
        }

        .recipe-list {
            margin-left: 40px;
        }

        a {
            display: block;
            padding: 4px 0;
            text-decoration: none;
            color: #333;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<h1>{{ title }}</h1>

{% for category, cuisines in grouped.items() %}
<div class="category">
    <h2>{{ category }}</h2>

    {% for cuisine, recipes in cuisines.items() %}
    <div class="cuisine">
        <h3>{{ cuisine }}</h3>

        <div class="recipe-list">
            {% for recipe in recipes %}
                <a href="recipes/{{ recipe.slug }}.html">
                    {{ recipe.recipe_name }}
                </a>
            {% endfor %}
        </div>
    </div>
    {% endfor %}

</div>
{% endfor %}

</body>
</html>
