{% extends "base.html" %}

{% block content %}

<h1>Recipe Categories</h1>

<p>
  Browse recipes by type below.
</p>

<ul>
  {% for category in categories %}
    <li>
      <a href="/category/{{ category|lower|replace(' ', '-') }}/">
        {{ category }}
      </a>
    </li>
  {% endfor %}
</ul>

{% endblock %}
